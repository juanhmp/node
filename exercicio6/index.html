<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Página de Boas-vindas</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
    }

    .card {
      text-align: center;
      background: rgba(255, 255, 255, 0.15);
      padding: 50px;
      border-radius: 25px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 60px;
      margin: 0;
      letter-spacing: 4px;
      animation: brilho 2s infinite alternate;
    }

    p {
      font-size: 20px;
      margin-top: 15px;
    }

    button {
      margin-top: 25px;
      padding: 12px 30px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #2575fc;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #f1f1f1;
    }

    @keyframes brilho {
      from {
        text-shadow: 0 0 10px white;
      }
      to {
        text-shadow: 0 0 25px #fff, 0 0 40px #00ffff;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>BEM-VINDO</h1>
    <p>Que bom ter você aqui!</p>
    <button>Entrar</button>
  </div>

</body>
</html>
