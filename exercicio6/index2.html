<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POST2</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(-45deg,#00c6ff,#0072ff,#00dbde,#fc00ff);
            background-size:400% 400%;
            animation:fundo 10s ease infinite;
            overflow:hidden;
        }

        @keyframes fundo{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .container{
            text-align:center;
            color:white;
            padding:50px;
            border-radius:25px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            box-shadow:0 0 40px rgba(0,0,0,0.3);
        }

        h1{
            font-size:5rem;
            text-transform:uppercase;
            letter-spacing:8px;
            animation:brilho 2s infinite alternate;
        }

        p{
            margin-top:15px;
            font-size:1.2rem;
        }

        .btn{
            margin-top:30px;
            padding:15px 35px;
            border:none;
            border-radius:50px;
            font-size:1rem;
            cursor:pointer;
            background:white;
            color:#0072ff;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.1);
        }

        @keyframes brilho{
            from{
                text-shadow:0 0 10px white;
            }
            to{
                text-shadow:0 0 20px white,
                             0 0 40px cyan,
                             0 0 60px cyan;
            }
        }

        .circulo{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.15);
            animation:flutuar linear infinite;
        }

        .c1{
            width:120px;
            height:120px;
            left:10%;
            animation-duration:12s;
        }

        .c2{
            width:180px;
            height:180px;
            right:10%;
            animation-duration:18s;
        }

        .c3{
            width:80px;
            height:80px;
            bottom:10%;
            left:50%;
            animation-duration:10s;
        }

        @keyframes flutuar{
            from{
                transform:translateY(100vh);
            }
            to{
                transform:translateY(-120vh);
            }
        }
    </style>
</head>
<body>

    <div class="circulo c1"></div>
    <div class="circulo c2"></div>
    <div class="circulo c3"></div>

    <div class="container">
        <h1>POST2</h1>
        <p>Bem-vindo à segunda página do projeto.</p>
        <button class="btn">Explorar</button>
    </div>

</body>
</html>
