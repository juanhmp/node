<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erro 404 - Página não encontrada</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #3b1d5c);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 30px;
    }

    h1 {
      font-size: 120px;
      color: #ff4f81;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      color: #ddd;
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      padding: 14px 28px;
      background-color: #ff4f81;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background-color: #ff2f6d;
      transform: scale(1.05);
    }

    .emoji {
      font-size: 60px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="emoji">🚧</div>
    <h1>404</h1>
    <h2>Ops! Página não encontrada</h2>
    <p>
      Parece que você tentou acessar uma página que não existe,
      foi removida ou está temporariamente indisponível.
    </p>
    <a href="index.html">Voltar para a página inicial</a>
  </div>

</body>
</html>
